<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Blog Management System</h1>

  <!-- Form for Adding / Editing Blogs -->
  <div class="form-container">
    <h3 id="form-heading">Add New Blog</h3>
    <input type="hidden" id="blog-id">
    <input type="text" id="blog-title" placeholder="Blog Title" required>
    <input type="text" id="blog-author" placeholder="Author Name" required>
    <button id="save-btn" onclick="saveBlog()">Add Blog</button>
  </div>

  <hr>

  <!-- Section to Render All Blogs -->
  <h3>All Blogs</h3>
  <ul id="blogs-list"></ul>

  <script src="script.js"></script>
</body>
</html>
